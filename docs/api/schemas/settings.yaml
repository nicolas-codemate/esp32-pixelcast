# Settings schemas

SettingsUpdateRequest:
  type: object
  description: >
    Partial update: only provided fields are changed. Omitted fields keep
    their current values.
  properties:
    brightness:
      type: integer
      minimum: 0
      maximum: 255
      description: Display brightness (0-255).
    autoRotate:
      type: boolean
      description: Enable/disable automatic app rotation.
    defaultDuration:
      type: integer
      description: Default app display duration in milliseconds.
    ntp:
      type: object
      description: >
        Update NTP source. Either field can be omitted; both are
        re-applied without reboot via `configTzTime()`.
      properties:
        server:
          type: string
          description: NTP server hostname.
        tz_posix:
          type: string
          maxLength: 64
          description: POSIX TZ string (e.g. `CET-1CEST,M3.5.0,M10.5.0/3`).

SettingsResponse:
  type: object
  properties:
    brightness:
      type: integer
      description: Current brightness (0-255).
    autoRotate:
      type: boolean
    defaultDuration:
      type: integer
      description: Default duration in milliseconds.
    display:
      type: object
      properties:
        width:
          type: integer
          description: Panel width in pixels.
        height:
          type: integer
          description: Panel height in pixels.
    ntp:
      type: object
      properties:
        server:
          type: string
          description: NTP server hostname.
        tz_posix:
          type: string
          maxLength: 64
          description: >
            POSIX TZ string controlling DST behaviour. Default
            `CET-1CEST,M3.5.0,M10.5.0/3` (Europe/Paris). The runtime parses
            this string and switches DST automatically.
          examples:
            - "CET-1CEST,M3.5.0,M10.5.0/3"
    mqtt:
      type: object
      properties:
        enabled:
          type: boolean
        prefix:
          type: string
          description: MQTT topic prefix.
