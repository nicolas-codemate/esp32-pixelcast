# Settings schemas

SettingsUpdateRequest:
  type: object
  description: >
    Partial update: only provided fields are changed. Omitted fields keep
    their current values.
  properties:
    brightness:
      type: integer
      minimum: 0
      maximum: 255
      description: Display brightness (0-255).
    autoRotate:
      type: boolean
      description: Enable/disable automatic app rotation.
    defaultDuration:
      type: integer
      description: Default app display duration in milliseconds.
    ntp:
      type: object
      description: >
        Update NTP source. Either field can be omitted; both are
        re-applied without reboot via `configTzTime()`.
      properties:
        server:
          type: string
          description: NTP server hostname.
        tz_posix:
          type: string
          maxLength: 63
          description: >
            POSIX TZ string controlling local time display and DST behaviour.
            Example: "CET-1CEST,M3.5.0,M10.5.0/3" for Europe/Paris with EU DST.
            The device does not embed an IANA tz database — clients should
            convert IANA names (e.g. "Europe/Paris") to POSIX TZ before
            sending.
          examples:
            - "CET-1CEST,M3.5.0,M10.5.0/3"
            - "UTC0"
            - "EST5EDT,M3.2.0,M11.1.0"
          default: "CET-1CEST,M3.5.0,M10.5.0/3"

SettingsResponse:
  type: object
  properties:
    brightness:
      type: integer
      description: Current brightness (0-255).
    autoRotate:
      type: boolean
    defaultDuration:
      type: integer
      description: Default duration in milliseconds.
    display:
      type: object
      properties:
        width:
          type: integer
          description: Panel width in pixels.
        height:
          type: integer
          description: Panel height in pixels.
    ntp:
      type: object
      properties:
        server:
          type: string
          description: NTP server hostname.
        tz_posix:
          type: string
          maxLength: 63
          description: >
            POSIX TZ string controlling local time display and DST behaviour.
            Example: "CET-1CEST,M3.5.0,M10.5.0/3" for Europe/Paris with EU DST.
            The device does not embed an IANA tz database — clients should
            convert IANA names (e.g. "Europe/Paris") to POSIX TZ before
            sending.
          examples:
            - "CET-1CEST,M3.5.0,M10.5.0/3"
            - "UTC0"
            - "EST5EDT,M3.2.0,M11.1.0"
          default: "CET-1CEST,M3.5.0,M10.5.0/3"
    mqtt:
      type: object
      properties:
        enabled:
          type: boolean
        prefix:
          type: string
          description: MQTT topic prefix.
